aid: vlex
name: vLex
description: >-
  vLex (part of Clio) is a global legal intelligence platform that applies AI
  to ingest, enrich, classify, and deliver insights from over 100 million legal
  documents across 2,000+ multilingual sources. The vLex Iceberg platform
  provides REST APIs for legal document anonymization, classification, key
  phrase extraction, citation detection, and AI-powered legal research. vLex
  also offers the Fastcase Legal Data API for raw legal data feeds.
type: Index
position: Consumer
access: 3rd-Party
image: https://vlex.com/hubfs/vlex-logo.svg
tags:
  - AI
  - Classification
  - Legal Research
  - Legal Tech
  - Natural Language Processing
  - Privacy
