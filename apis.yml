apis:
  - aid: vlex:iceberg-anonymization-api
    name: vLex Iceberg Anonymization API
    description: >-
      Identifies and anonymizes names and personally identifiable information
      from any text input. Pre-trained on legal data to recognize names,
      organizations, and sensitive entities within legal documents for
      privacy protection and data compliance.
    humanURL: https://developer.vlex.com/apis
    tags:
      - Anonymization
      - NLP
      - Privacy
      - Legal Tech
    properties:
      - type: Documentation
        url: https://developer.vlex.com/apis
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/vlex/refs/heads/main/openapi/vlex-iceberg-anonymization-openapi.yml
  - aid: vlex:iceberg-legal-research-api
    name: vLex Iceberg Legal Research API
    description: >-
      AI-powered legal research API providing document search, classification,
      key phrase extraction, citation detection (vCite), and legal entity
      identification across vLex's corpus of 100+ million legal documents
      from global jurisdictions.
    humanURL: https://developer.vlex.com/apis
    tags:
      - AI
      - Case Law
      - Citation Detection
      - Classification
      - Legal Research
      - Legal Tech
      - Search
    properties:
      - type: Documentation
        url: https://developer.vlex.com/apis
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/vlex/refs/heads/main/openapi/vlex-iceberg-legal-research-openapi.yml
  - aid: vlex:remote-auth-api
    name: vLex Remote Authentication API
    description: >-
      Single sign-on authentication API for corporate vLex accounts. Generates
      redirect URLs using HMAC authentication for seamless user access to
      vLex.com from institutional portals.
    humanURL: https://github.com/vlex/remote_auth
    tags:
